<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Mini World Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Mini World Shop</h1>

  <div class="modes">
    <button onclick="setMode('world')">🏡 Обычный мир</button>
    <button onclick="setMode('rivals')">⚔️ Rivals</button>
    <button onclick="setMode('survival')">☠️ Выживание</button>
  </div>

  <div class="top">
    <div>Режим: <span id="modeName">Обычный мир</span></div>
    <div>Монеты: <span id="coins">0</span></div>
    <div>HP: <span id="hp">100</span></div>
    <button onclick="openShop()">Магазин</button>
    <button onclick="resetGame()">Сброс</button>
  </div>

  <div id="game">
    <div id="player">🙂</div>
    <div id="bot" class="hidden">🤖</div>
  </div>

  <div id="shop" class="hidden">
    <h2>Магазин вещей</h2>

    <div class="item">
      <b>Синяя кепка</b>
      <p>Бесплатно: 20 монет</p>
      <button onclick="buyItem('cap', 20)">Купить</button>
    </div>

    <div class="item premium">
      <b>Золотая корона</b>
      <p>Премиум: 1.99 € — даёт x2 монеты</p>
      <button onclick="buyCrown()">Купить за 1.99 €</button>
    </div>

    <div class="item premium">
      <b>Неоновый питомец</b>
      <p>Премиум: 2.99 €</p>
      <button onclick="fakePayment('🐉')">Купить за деньги</button>
    </div>

    <button onclick="closeShop()">Закрыть</button>
  </div>

  <p class="hint">
    Стрелки — движение. Пробел — удар в Rivals/Выживании.
  </p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game.js"></script>
</body>
</html>
